services:
  redis:
    image: redis:7-alpine
    container_name: universal_agent_redis
    restart: unless-stopped
    ports:
      # Bind loopback only: consumers are all on-box, and Docker publishes to
      # 0.0.0.0 by default which bypasses ufw (public exposure). Loopback keeps
      # Redis off every non-local interface. See also the DOCKER-USER firewall.
      - "127.0.0.1:6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD before starting Redis}
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      sh -c 'exec redis-server /usr/local/etc/redis/redis.conf --requirepass "$${REDIS_PASSWORD}"'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Note: REDIS_PASSWORD is sourced from Infisical secret injection.
    # Port 6379 is loopback-bound above; no external/tailnet consumers exist.

volumes:
  redis_data:
