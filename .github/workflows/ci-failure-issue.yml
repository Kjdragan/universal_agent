name: CI Failure Issue Filer

# Surfaces failed workflow runs as GitHub issues so the operator (and any
# AI session reading the issue feed) discovers them immediately instead of
# learning hours later that PR #N's Validate run failed silently. Also
# auto-closes those issues once a subsequent run of the SAME workflow on
# the SAME branch turns green — closes the loop so the operator doesn't
# accumulate stale issues for problems that were already fixed.
#
# Background (observed 2026-05-11): PR #221 had a failing `Validate PR`
# run that sat unnoticed for hours. The operator's prompt — "Do we not
# have a process to follow up on it or retry until successful or fixed?"
# — exposed the gap: GitHub's notification UI surfaces failures, but
# autonomous AI sessions don't watch the UI and operator inbox volume
# meant the email got lost.
#
# Mechanism: `workflow_run` triggers on any registered workflow finishing.
# We filter to `conclusion == failure` and open one issue per failed run
# (dedup is per-run-id — re-runs get their own issue).
#
# Runs 24/7. Per docs/operations/operating_hours_dormancy.md § "Scope":
# infrastructure-event handlers like CI failure handling are NOT subject
# to the active-hours dormancy default. A PR that fails at 3 AM should be
# surfaced for morning fix, not silently broken until 6 AM.

on:
  workflow_run:
    # Every workflow whose failure should be surfaced to the operator. Names
    # must match each workflow's `name:` exactly. Updated 2026-05-30: dropped
    # the retired "Auto-Promote to Production" (dead — never matched); ADDED
    # "PR Rebase Watchdog" (its failures were going unsurfaced — run
    # 26691762645 had to be caught manually) plus the two doc workflows.
    workflows:
      - Deploy
      - PR Validate
      - PR Auto-Merge
      - PR Rebase Watchdog
      - Documentation Audit
      - Nightly Documentation Health
      - Codie PR Review Queue
    types: [completed]

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  file-issue:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create ci-failure \
            --repo "${REPO}" \
            --color B60205 \
            --description "Auto-filed by ci-failure-issue.yml when a workflow run fails" \
            2>/dev/null || true

      - name: Open issue for failed run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 2026-05-11 fix: `gh issue list` / `gh issue create` auto-detect
          # the repo by running `git rev-parse`, which fails on a
          # checkout-less runner with `fatal: not a git repository`. Pass
          # --repo explicitly so the CLI doesn't shell out to git. This
          # workflow has run 64 times and successfully filed 0 issues
          # because of this bug — every failure since the watcher was
          # introduced has been silent. Issue creation now works without
          # an actions/checkout dependency.
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail
          SHORT_SHA="${HEAD_SHA:0:7}"
          TITLE="[ci-watchdog] ${WORKFLOW_NAME} failed on ${HEAD_BRANCH} (${SHORT_SHA})"

          # Dedup: don't re-file if an issue already exists for this exact run.
          EXISTING=$(gh issue list \
            --repo "${REPO}" \
            --label ci-failure \
            --state open \
            --search "in:title \"${RUN_ID}\"" \
            --json number \
            --jq 'length')
          if [ "${EXISTING}" -gt 0 ]; then
            echo "Issue already exists for run ${RUN_ID}; skipping."
            exit 0
          fi

          {
            printf 'Workflow **%s** failed.\n\n' "${WORKFLOW_NAME}"
            printf -- '- Run: [%s](%s)\n' "${RUN_ID}" "${RUN_URL}"
            printf -- '- Branch: `%s`\n' "${HEAD_BRANCH}"
            printf -- '- Head SHA: `%s`\n' "${SHORT_SHA}"
            printf -- '- Triggering event: `%s`\n\n' "${EVENT}"
            printf -- '---\n\n'
            printf 'Auto-filed by `ci-failure-issue.yml`. Close once fixed or superseded by a passing re-run.\n'
          } > /tmp/issue-body.md

          gh issue create \
            --repo "${REPO}" \
            --title "${TITLE} — run_id=${RUN_ID}" \
            --body-file /tmp/issue-body.md \
            --label ci-failure

      - name: Notify UA CI-failure auto-fix hook
        # Fire-and-forget POST to the UA gateway's dedicated, ops-authed
        # ci-failure hook. The gateway schedules a DURABLE one-shot ~15-min
        # grace timer; UA (NOT this runner, NOT Simone's heartbeat) re-verifies
        # after the grace window and either dispatches a Cody fix mission or
        # escalates to the operator. Event-driven; no polling, no sleeping
        # runner. Public URL + ops-token => no Tailscale, no actions/checkout
        # (keeps this job free of the orphaned-gitlink `git exit 128` class).
        # Non-fatal: a hook/gateway outage must never fail the issue filer.
        env:
          OPS_TOKEN: ${{ secrets.UA_OPS_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          EVENT: ${{ github.event.workflow_run.event }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          set -euo pipefail
          if [ -z "${OPS_TOKEN}" ]; then
            echo "UA_OPS_TOKEN secret not set; skipping ci-failure hook POST."
            exit 0
          fi
          BODY=$(jq -n \
            --arg workflow "${WORKFLOW_NAME}" \
            --arg conclusion "${CONCLUSION}" \
            --arg head_branch "${HEAD_BRANCH}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg run_id "${RUN_ID}" \
            --arg run_url "${RUN_URL}" \
            --arg event "${EVENT}" \
            --arg pr "${PR_NUMBER}" \
            '{workflow:$workflow, conclusion:$conclusion, head_branch:$head_branch,
              head_sha:$head_sha, run_id:$run_id, run_url:$run_url, event:$event,
              pr_number: (if $pr == "" then null else ($pr|tonumber) end)}')
          HTTP=$(curl -sS -o /tmp/hook_resp.json -w '%{http_code}' --max-time 20 \
            -X POST "https://app.clearspringcg.com/api/v1/hooks/ci-failure" \
            -H "content-type: application/json" \
            -H "x-ua-ops-token: ${OPS_TOKEN}" \
            --data "${BODY}" || echo "000")
          echo "ci-failure hook responded HTTP ${HTTP}"
          cat /tmp/hook_resp.json 2>/dev/null || true
          if [ "${HTTP}" != "200" ]; then
            echo "::warning::ci-failure hook POST non-200 (${HTTP}); grace-recheck not scheduled. Non-fatal."
          fi

  close-issue:
    # Mirror of file-issue but for the "CI flipped green on this branch+workflow"
    # signal. Closes any open ci-failure issues whose title matches the same
    # workflow + branch as this successful run. Match is by branch, not SHA —
    # PR #350's failure was filed for commit 75f54a48 but the green re-run
    # was on 8f450812 (same branch, different SHA), and the underlying
    # problem was resolved either way. Branch-level match handles that case.
    #
    # Without this job, ci-failure issues accumulate forever as historical
    # debris even though their root cause merged; the operator has to close
    # them by hand. Observed: PR #351 sat open after PR #350's success.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Close any ci-failure issues for this workflow + branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          SHORT_SHA="${HEAD_SHA:0:7}"
          # Title format from file-issue above:
          #   "[ci-watchdog] {WORKFLOW_NAME} failed on {HEAD_BRANCH} ({sha}) — run_id={N}"
          # We match on the unique substring "{WORKFLOW_NAME} failed on {HEAD_BRANCH}"
          # which is stable across SHA changes for the same branch+workflow.
          #
          # List all open ci-failure issues, then filter in shell. This is
          # more robust than gh's `--search` for branch names containing
          # slashes or other special characters.
          OPEN_JSON=$(gh issue list \
            --repo "${REPO}" \
            --label ci-failure \
            --state open \
            --limit 100 \
            --json number,title)

          # JQ extracts numbers whose title contains both the workflow name
          # and "failed on $HEAD_BRANCH". Using `contains` not `==` so we
          # match the full descriptive title.
          MATCHES=$(echo "$OPEN_JSON" | jq -r \
            --arg wf "${WORKFLOW_NAME} failed on ${HEAD_BRANCH}" \
            '.[] | select(.title | contains($wf)) | .number')

          if [ -z "$MATCHES" ]; then
            echo "No open ci-failure issues to close for ${WORKFLOW_NAME} on ${HEAD_BRANCH}."
            exit 0
          fi

          for NUM in $MATCHES; do
            echo "Closing issue #${NUM} (workflow=${WORKFLOW_NAME} now green on ${HEAD_BRANCH} @ ${SHORT_SHA})"
            gh issue comment "$NUM" --repo "${REPO}" --body \
              "Auto-resolved: [${WORKFLOW_NAME}](${RUN_URL}) succeeded on branch \`${HEAD_BRANCH}\` at \`${SHORT_SHA}\` (run ${RUN_ID})."
            gh issue close "$NUM" --repo "${REPO}" --reason completed
          done
