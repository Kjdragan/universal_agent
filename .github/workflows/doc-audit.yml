name: Documentation Audit

# Deterministic documentation gate (the "teeth" from the doc refactor plan §3).
# Runs scripts/doc_audit.py on PRs that touch project_docs/ or the engine itself:
#   - frontmatter schema present + code_paths globs resolve
#   - every `file::symbol` citation resolves in code
#   - zero line-number citations (they rot)
#   - internal links resolve; canonical docs are indexed in README
# Then scripts/registry_drift_check.py adds status-conditional teeth for the task
# type registry: a `removed` row may not cite live code, a `canonical` row must,
# and the scheduling frozenset pointer must stay intact.
# Plus a tripwire: an automated doc-fix PR (head branch docfix/*) must touch ONLY
# documentation paths — a hard mechanical replacement for the prompt-only firewall
# that was bypassed on 2026-04-24.

on:
  pull_request:
    paths:
      - 'project_docs/**'
      - 'docs/**'
      - 'scripts/doc_audit.py'
      - 'scripts/registry_drift_check.py'
      - 'src/universal_agent/systemd_migrated_jobs.py'
      - '.github/workflows/doc-audit.yml'

permissions:
  contents: read

jobs:
  deterministic-audit:
    name: Deterministic doc audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50  # shallow: these jobs need only base+head (or no git), not 323MB of full history
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run doc_audit.py (stdlib-only; errors fail the PR)
        run: python scripts/doc_audit.py
      - name: Registry drift check (status claims vs code reality)
        # Status-conditional guard the generic doc audit can't make: a row marked
        # `removed` must not cite live code, a `canonical` row must, and the
        # scheduling section's frozenset pointer must stay intact. (Also runs on
        # every PR as tests/unit/test_registry_drift_check.py, catching code-side
        # deletions that never touch project_docs/ and so never trigger this job.)
        run: python scripts/registry_drift_check.py

  docfix-tripwire:
    name: Doc-fix PR touches docs only
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Only enforced for automated documentation-fix PRs.
    if: startsWith(github.head_ref, 'docfix/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 50  # shallow: these jobs need only base+head (or no git), not 323MB of full history
      - name: Fail if any non-documentation path changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Changed files in this doc-fix PR:"
          changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA")"  # three-dot = merge-base diff; two-dot false-failed when main advanced post-divergence (#905)
          echo "$changed"
          # Allowed: project_docs/**, docs/** (legacy/archive), root *.md, AGENTS.md
          violations="$(echo "$changed" | grep -vE '^(project_docs/|docs/|[^/]+\.md$|AGENTS\.md$)' || true)"
          if [ -n "$violations" ]; then
            echo "::error::Doc-fix PR modified non-documentation paths:"
            echo "$violations"
            exit 1
          fi
          echo "OK — doc-fix PR touches documentation only."

  # NOTE: the "No new writes to archived docs/" guard moved to its own always-on
  # workflow (.github/workflows/archive-write-guard.yml) so it can be a REQUIRED
  # status check. A path-filtered guard (this workflow only runs on doc paths)
  # cannot be made required without blocking unrelated PRs that never trigger it.
