name: Deploy

on:
  push:
    branches:
      - main
    # Skip production deploy when a push to `main` only contains docs,
    # markdown, or scheduled-job state files. These are produced by
    # `nightly-doc-drift-audit.yml` and `openclaw-release-sync.yml` (which
    # auto-merge their PRs to main directly post-2026-05-10) and shouldn't
    # restart the gateway. GitHub semantics: deploy is skipped only when
    # **every** changed file matches a `paths-ignore` glob — a mixed
    # code+docs commit still deploys, which is the safe default.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'reports/**'
      - 'state/**'
      # Machine-generated audit/report artifacts written by the two
      # scheduled jobs (nightly-doc-drift-audit, openclaw-release-sync).
      # These are force-added (artifacts/ is normally .gitignored) into
      # main via auto-merged PR; nothing under artifacts/ is source code,
      # so a deploy on these commits would just restart the gateway for
      # zero behavior change.
      - 'artifacts/**'
      # Harness-managed session memory snapshots (memory/index.json,
      # memory/<date>.md). Auto-written during agent sessions and
      # periodically committed (e.g. PR #182). Production gateway never
      # reads these — they're operator-tier state — so a deploy that
      # only touches memory/ would restart the gateway for nothing.
      - 'memory/**'
  workflow_dispatch:

# 2026-05-11 PM: serialize concurrent deploys to prevent races on the
# `/opt/universal_agent/.git/index.lock` file. When multiple PRs merge to
# main within seconds (e.g. PRs #231, #226, #232 + Dependabot batch),
# their `push` triggers fire deploy.yml simultaneously; three concurrent
# `git fetch` invocations on the same checkout collide and ALL fail with
# `fatal: Unable to create '/opt/universal_agent/.git/index.lock': File
# exists.`. `cancel-in-progress: false` queues subsequent runs instead of
# cancelling them — main is the source of truth and every deploy should
# run to completion (last-write-wins semantics on production).
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci-gha
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Deploy to Production VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          # For fetching the deploy script via the GitHub API (no checkout step).
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "--> SSH preflight (non-interactive check)..."
          set +e
          timeout 60s ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "echo SSH_OK" >/tmp/ssh_preflight.out 2>/tmp/ssh_preflight.err
          preflight_status=$?
          set -e

          if [ "$preflight_status" -ne 0 ]; then
            echo "ERROR: SSH preflight failed with status $preflight_status"
            cat /tmp/ssh_preflight.err || true
            if grep -Eqi "additional check|login\\.tailscale\\.com" /tmp/ssh_preflight.err; then
              echo "::error::Tailscale SSH interactive check detected. Ensure CI identity tag (tag:ci-gha) has SSH action=accept to target tag (tag:vps)."
            fi
            exit "$preflight_status"
          fi

          if ! grep -q "^SSH_OK$" /tmp/ssh_preflight.out; then
            echo "ERROR: SSH preflight succeeded but did not return expected marker."
            cat /tmp/ssh_preflight.out || true
            exit 1
          fi

          rm -f /tmp/ssh_preflight.out /tmp/ssh_preflight.err
          
          # ServerAliveInterval+CountMax keep the SSH session alive during long
          # silent remote steps (systemd daemon-reload + enable --now on a busy
          # VPS can take minutes with no output). Without these, an intermediate
          # idle-timeout-killer drops the TCP connection and the workflow exits
          # 255 even when the actual deploy work completes. See
          # docs/operations/2026-05-16_deploy_ssh_timeout_plan.md (Option A).
          # 30s keepalive × 120 max = up to 60 min of pure idle tolerance,
          # inside the outer `timeout 30m` envelope.
          # Fetch the committed deploy script for THIS exact commit via the
          # GitHub API — no `actions/checkout` step. Checkout would materialize
          # the whole repo (and its post-job submodule cleanup chokes on the
          # orphaned `.claude/agents/agent-browser` / `test-remotion-project`
          # gitlinks that have no .gitmodules entry — a benign exit-128 warning),
          # plus it pins us to a Node-20 action (deprecated). We only need one
          # file, so pull it raw at $GITHUB_SHA.
          gh api "repos/${GITHUB_REPOSITORY}/contents/scripts/deploy/remote_deploy.sh?ref=${GITHUB_SHA}" \
            -H "Accept: application/vnd.github.raw" > /tmp/remote_deploy.sh
          test -s /tmp/remote_deploy.sh || { echo "::error::failed to fetch remote_deploy.sh"; exit 1; }

          # Feed the deploy script over SSH stdin and run it on the VPS with
          # `bash -s`. The three Infisical bootstrap secrets are prepended as
          # `export` lines THROUGH STDIN (not argv — they never appear in the
          # VPS process table) so scripts/deploy/remote_deploy.sh stays free of
          # GitHub-Actions ${{ secrets }} placeholders and is shellcheck-able.
          # This replaces the former 420-line inline heredoc (Phase 1
          # decomposition, 2026-05-30) and removes the GHA-parser fragility that
          # the heredoc form was prone to (2026-05-27 quirk).
          {
            printf 'export INFISICAL_CLIENT_ID=%q\n' "$INFISICAL_CLIENT_ID"
            printf 'export INFISICAL_CLIENT_SECRET=%q\n' "$INFISICAL_CLIENT_SECRET"
            printf 'export INFISICAL_PROJECT_ID=%q\n' "$INFISICAL_PROJECT_ID"
            cat /tmp/remote_deploy.sh
          } | timeout 30m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=120 "$SSH_USER@$SSH_HOST" 'bash -s'

      # Operator notification when the deploy job fails. Posts an email
      # to AgentMail. Best-effort: a missing API key or send failure
      # never double-faults the deploy.
      - name: Notify operator on deploy failure via AgentMail
        if: failure()
        env:
          AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_REF: ${{ github.ref_name }}
        shell: bash
        run: |
          set +e
          DEPLOY_FAILURE_EMAIL="kevinjdragan@gmail.com"
          DEPLOY_FAILURE_INBOX="oddcity216@agentmail.to"
          if [ -z "${AGENTMAIL_API_KEY:-}" ]; then
            echo "::warning::AGENTMAIL_API_KEY not configured; skipping failure-email notification."
            exit 0
          fi
          SHORT_SHA="${COMMIT_SHA:0:8}"
          SUBJECT="[deploy-failed] universal_agent main @${SHORT_SHA}"
          BODY=$(printf 'Production deploy FAILED.\n\nCommit:    %s\nBranch:    %s\nWorkflow:  %s\n\nNext steps:\n  1. Open the workflow URL above to see which step failed.\n  2. If gateway health-wait timed out, check the VPS:\n       ssh ua@uaonvps "journalctl -u universal-agent-gateway -n 200 --no-pager"\n  3. The deploy concurrency guard queues subsequent deploys until this one resolves, so further merges to main will wait.' \
            "$COMMIT_SHA" "$COMMIT_REF" "$RUN_URL")
          PAYLOAD=$(jq -n \
            --arg to "$DEPLOY_FAILURE_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg text "$BODY" \
            '{to: [$to], subject: $subject, text: $text, labels: ["deploy-failed", "ops"]}')
          curl -sS -o /tmp/agentmail_resp.json -w "AgentMail HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Bearer ${AGENTMAIL_API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 15 \
            --data "$PAYLOAD" \
            "https://api.agentmail.to/v0/inboxes/${DEPLOY_FAILURE_INBOX}/messages/send" \
            || true
          head -c 500 /tmp/agentmail_resp.json 2>/dev/null || true
          echo ""
          exit 0
