name: Nightly Documentation Drift Audit

on:
  schedule:
    # 08:17 UTC ≈ 3:17 AM CDT — off-peak minute to reduce GHA scheduling delay
    - cron: '17 8 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours of git history to scan (default: 24)'
        required: false
        default: '24'

jobs:
  doc-drift-audit:
    name: Run Documentation Drift Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          # Need full history so doc_drift_auditor.py can run `git log`
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python via uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install project dependencies
        run: uv sync --frozen --python 3.12 --no-install-package manim --no-install-package pycairo --no-install-package manimpango

      # ── Stage 1: Audit ──────────────────────────────────────────────────
      - name: "Stage 1 — Run Documentation Drift Auditor"
        id: audit
        env:
          SINCE_HOURS: ${{ github.event.inputs.since_hours || '24' }}
        run: |
          STAGE1_START=$(date +%s)
          echo "Running doc_drift_auditor.py (scanning last ${SINCE_HOURS}h of git history)..."
          set +e
          uv run --no-sync python src/universal_agent/scripts/doc_drift_auditor.py \
            --since-hours "${SINCE_HOURS}"
          EXIT_CODE=$?
          set -e

          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"

          # Determine date for report path
          REPORT_DATE=$(date -u +%Y-%m-%d)
          echo "report_date=${REPORT_DATE}" >> "$GITHUB_OUTPUT"
          echo "report_dir=artifacts/doc-drift-reports/${REPORT_DATE}" >> "$GITHUB_OUTPUT"

          STAGE1_END=$(date +%s)
          echo "⏱️  Stage 1 completed in $((STAGE1_END - STAGE1_START))s (exit=${EXIT_CODE})"

          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "✅ Audit complete — no documentation drift issues found."
          else
            echo "⚠️  Audit complete — documentation drift issues detected (exit ${EXIT_CODE})."
          fi

      - name: Verify report files were produced
        run: |
          REPORT_DIR="artifacts/doc-drift-reports/$(date -u +%Y-%m-%d)"
          echo "Checking for reports in ${REPORT_DIR}..."
          if [ ! -f "${REPORT_DIR}/drift_report.json" ]; then
            echo "::error::drift_report.json was not produced by the auditor!"
            exit 1
          fi
          if [ ! -f "${REPORT_DIR}/DRIFT_REPORT.md" ]; then
            echo "::error::DRIFT_REPORT.md was not produced by the auditor!"
            exit 1
          fi
          echo "✅ Both report files confirmed present."
          echo "--- drift_report.json summary ---"
          python3 -c "
          import json
          r = json.load(open('${REPORT_DIR}/drift_report.json'))
          print(f\"Issues found: {r['total_issues']}\")
          print(f\"  P0: {r['issues_by_severity']['P0']}\")
          print(f\"  P1: {r['issues_by_severity']['P1']}\")
          print(f\"  P2: {r['issues_by_severity']['P2']}\")
          print(f\"  Git files scanned: {r['git_summary']['files_changed']}\")
          "

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ steps.audit.outputs.report_date }}
          path: artifacts/doc-drift-reports/
          retention-days: 30

      # ── Stage 1b: Commit Report to develop ──────────────────────────────
      - name: "Stage 1b — Commit drift report via auto-merged PR"
        id: commit_report
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT_DIR="artifacts/doc-drift-reports/$(date -u +%Y-%m-%d)"
          REPORT_DATE=$(date -u +%Y-%m-%d)
          PR_BRANCH="chore/drift-report-${REPORT_DATE}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Authenticate pushes with the token (fixes git exit 128 from token-less push)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Clean up any orphan drift-report branches from previous failed runs
          echo "🧹 Cleaning up orphan drift-report branches..."
          for orphan in $(git ls-remote --heads origin 'refs/heads/chore/drift-report-*' | awk '{print $2}' | sed 's|refs/heads/||'); do
            if [ "$orphan" != "$PR_BRANCH" ]; then
              echo "  Deleting orphan branch: $orphan"
              git push origin --delete "$orphan" 2>/dev/null || true
            fi
          done

          # Stage only the report files — force because artifacts/ is gitignored
          git add -f "${REPORT_DIR}/drift_report.json"
          git add -f "${REPORT_DIR}/DRIFT_REPORT.md"

          # Check if there's actually anything new to commit
          if git diff --cached --quiet; then
            echo "ℹ️  No changes in report files — report is identical to last run. Skipping commit."
            echo "pr_created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ISSUE_COUNT=$(python3 -c "import json; r = json.load(open('${REPORT_DIR}/drift_report.json')); print(r['total_issues'])")
          COMMIT_MSG="chore(docs): nightly drift report ${REPORT_DATE} — ${ISSUE_COUNT} issues [auto]"

          # Clean up existing branch if re-running same day
          git push origin --delete "${PR_BRANCH}" 2>/dev/null || true

          # Create temp branch, commit, push
          git checkout -b "${PR_BRANCH}"
          git commit -m "${COMMIT_MSG}"
          git push origin "${PR_BRANCH}"

          # Create PR (without label to avoid failure)
          PR_URL=$(gh pr create \
            --base develop \
            --head "${PR_BRANCH}" \
            --title "${COMMIT_MSG}" \
            --body "Automated nightly drift report for ${REPORT_DATE}. Auto-merged by CI.")

          echo "📝 PR created: ${PR_URL}"
          echo "pr_created=true" >> "$GITHUB_OUTPUT"
          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

          # Best-effort label — don't fail if label doesn't exist
          gh pr edit "${PR_URL}" --add-label "automated" 2>/dev/null || true

          # Auto-merge with fallback chain
          if gh pr merge "${PR_URL}" --squash --delete-branch --admin 2>/dev/null; then
            echo "✅ PR merged with --admin"
          elif gh pr merge "${PR_URL}" --squash --delete-branch 2>/dev/null; then
            echo "✅ PR merged (standard)"
          else
            echo "⚠️ Auto-merge failed — PR remains open for manual merge at: ${PR_URL}"
          fi

          echo "✅ Drift report committed to develop via auto-merged PR."

          # Return to develop for Stage 2
          git checkout develop
          git pull origin develop

      - name: Summarize in Job Summary
        if: always()
        run: |
          REPORT_DIR="artifacts/doc-drift-reports/$(date -u +%Y-%m-%d)"
          if [ -f "${REPORT_DIR}/DRIFT_REPORT.md" ]; then
            echo "## 📋 Documentation Drift Report" >> "$GITHUB_STEP_SUMMARY"
            cat "${REPORT_DIR}/DRIFT_REPORT.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ Report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── Stage 2: Dispatch VP doc-maintenance to VPS ─────────────────────
      - name: "Stage 2 — Connect to Tailscale"
        if: steps.audit.outputs.exit_code != '0'
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci-gha
          hostname: gha-doc-stage2-${{ github.run_id }}
          ping: ${{ secrets.VPS_SSH_HOST }}

      - name: "Stage 2 — Copy report and dispatch VP missions"
        if: steps.audit.outputs.exit_code != '0'
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          STAGE2_START=$(date +%s)
          echo "🔄 Stage 2: Dispatching VP doc-maintenance missions to VPS..."

          # Configure SSH key
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15"

          # Copy drift report to VPS (artifacts/ is gitignored so won't be on VPS via deploy)
          REPORT_DIR="artifacts/doc-drift-reports/$(date -u +%Y-%m-%d)"
          echo "📋 Copying drift report to VPS..."
          ssh ${SSH_OPTS} "$SSH_USER@$SSH_HOST" "mkdir -p /opt/universal_agent/${REPORT_DIR}" || true
          scp ${SSH_OPTS} \
            "${REPORT_DIR}/drift_report.json" \
            "$SSH_USER@$SSH_HOST:/opt/universal_agent/${REPORT_DIR}/" || {
              echo "::warning::Failed to SCP drift report to VPS. Stage 2 will try to use an existing report."
            }

          # Verify the report landed on VPS
          echo "🔍 Verifying report on VPS..."
          ssh ${SSH_OPTS} "$SSH_USER@$SSH_HOST" \
            "test -f /opt/universal_agent/${REPORT_DIR}/drift_report.json && echo 'Report verified on VPS' || echo 'WARNING: Report not found on VPS'"

          # Run Stage 2 doc maintenance agent on VPS
          echo "🚀 Dispatching VP missions..."
          ssh ${SSH_OPTS} "$SSH_USER@$SSH_HOST" \
            "cd /opt/universal_agent && PYTHONPATH=src ./.venv/bin/python3 -m universal_agent.scripts.doc_maintenance_agent" \
            2>&1 | tee stage2_output.log

          STAGE2_EXIT=$?
          STAGE2_END=$(date +%s)

          if [ "${STAGE2_EXIT}" -eq 0 ]; then
            echo "✅ Stage 2 complete in $((STAGE2_END - STAGE2_START))s — VP missions dispatched"
            echo "### 🤖 Stage 2: VP Missions Dispatched ($((STAGE2_END - STAGE2_START))s)" >> "$GITHUB_STEP_SUMMARY"
            tail -5 stage2_output.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Stage 2 dispatch failed in $((STAGE2_END - STAGE2_START))s (exit ${STAGE2_EXIT})"
            echo "### ⚠️ Stage 2: Dispatch Failed ($((STAGE2_END - STAGE2_START))s)" >> "$GITHUB_STEP_SUMMARY"
            tail -10 stage2_output.log >> "$GITHUB_STEP_SUMMARY"
          fi
