name: Run Clear Agent Queue
on:
  workflow_dispatch:
jobs:
  run-clear:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-clear-${{ github.run_id }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Run Script on VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          timeout 1m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            STAGING_DIR='/opt/universal-agent-staging'
            echo '--> Running clear script in Staging...'
            export PYTHONPATH='src'
            cd \$STAGING_DIR && /opt/universal-agent-staging/.venv/bin/python scripts/clear_agent_queue.py
            
            PROD_DIR='/opt/universal_agent'
            if [ -d \"\$PROD_DIR/.venv\" ]; then
              echo '--> Running clear script in Production (/opt/universal_agent)...'
              export PYTHONPATH='src'
              cd \$PROD_DIR && \$PROD_DIR/.venv/bin/python scripts/clear_agent_queue.py || true
            fi
            
            PROD_REPO_DIR='/opt/universal_agent_repo'
            if [ -d \"\$PROD_REPO_DIR/.venv\" ]; then
              echo '--> Running clear script in Production (/opt/universal_agent_repo)...'
              export PYTHONPATH='src'
              cd \$PROD_REPO_DIR && \$PROD_REPO_DIR/.venv/bin/python scripts/clear_agent_queue.py || true
            fi
          "
