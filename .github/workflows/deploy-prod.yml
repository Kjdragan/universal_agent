name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Deploy to Production VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
            # Exit immediately on error
            set -euo pipefail
            
            PROD_DIR="/opt/universal_agent"
            
            echo "Deploying Production to $PROD_DIR..."
            
            if [ ! -d "$PROD_DIR/.git" ]; then
              echo "Error: Production repository not found at $PROD_DIR."
              exit 1
            fi
            
            cd "$PROD_DIR"
            
            # 1. Pull latest code
            echo "--> Fetching and pulling latest main branch..."
            sudo -u ua bash -c "cd $PROD_DIR && git fetch origin && git checkout main && git pull origin main"
            
            # Note: We do NOT auto-provision production secrets from dev. 
            # Production secrets (in prod-hq) should be curated manually or via an explicit sync script.
            
            # 2. Dependency Sync
            echo "--> Syncing dependencies with uv..."
            sudo -u ua bash -c "export PATH=\"/home/ua/.local/bin:/usr/local/bin:$PATH\"; cd $PROD_DIR && uv sync"
            
            # 3. Restart Systemd Service
            echo "--> Restarting production services..."
            # Using the existing deployment logic for production
            sudo -u ua XDG_RUNTIME_DIR=/run/user/$(id -u ua) systemctl --user restart universal-agent-gateway universal-agent-api universal-agent-webui universal-agent-telegram universal-agent-vp-worker@vp.general.primary universal-agent-vp-worker@vp.coder.primary
            
            echo "Deployment to Production complete!"
          EOF
