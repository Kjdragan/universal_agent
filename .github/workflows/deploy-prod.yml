name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Deploy to Production VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "--> SSH preflight (non-interactive check)..."
          set +e
          timeout 60s ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "echo SSH_OK" >/tmp/ssh_preflight.out 2>/tmp/ssh_preflight.err
          preflight_status=$?
          set -e

          if [ "$preflight_status" -ne 0 ]; then
            echo "ERROR: SSH preflight failed with status $preflight_status"
            cat /tmp/ssh_preflight.err || true
            if grep -Eqi "additional check|login\\.tailscale\\.com" /tmp/ssh_preflight.err; then
              echo "::error::Tailscale SSH interactive check detected. Ensure CI identity tag (tag:ci-gha) has SSH action=accept to target tag (tag:vps)."
            fi
            exit "$preflight_status"
          fi

          if ! grep -q "^SSH_OK$" /tmp/ssh_preflight.out; then
            echo "ERROR: SSH preflight succeeded but did not return expected marker."
            cat /tmp/ssh_preflight.out || true
            exit 1
          fi

          rm -f /tmp/ssh_preflight.out /tmp/ssh_preflight.err
          
          timeout 15m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" << 'EOF'
            # Exit immediately on error
            set -euo pipefail
            PROD_DIR="/opt/universal_agent"
            REPO_URL="https://github.com/Kjdragan/universal_agent.git"

            if [ ! -d "$PROD_DIR/.git" ]; then
              echo "--> Production repository missing at $PROD_DIR; bootstrapping clone..."
              if [ -e "$PROD_DIR" ] && [ ! -d "$PROD_DIR" ]; then
                echo "Error: $PROD_DIR exists but is not a directory."
                exit 1
              fi
              if [ -d "$PROD_DIR" ] && [ -n "$(ls -A "$PROD_DIR" 2>/dev/null)" ]; then
                echo "--> WARNING: $PROD_DIR is non-empty and not a git checkout; using /opt/universal_agent_repo instead."
                PROD_DIR="/opt/universal_agent_repo"
                if [ -e "$PROD_DIR" ] && [ ! -d "$PROD_DIR" ]; then
                  echo "Error: $PROD_DIR exists but is not a directory."
                  exit 1
                fi
              fi
              if [ ! -d "$PROD_DIR/.git" ]; then
                mkdir -p "$(dirname "$PROD_DIR")"
                if [ -d "$PROD_DIR" ] && [ -n "$(ls -A "$PROD_DIR" 2>/dev/null)" ] && [ ! -d "$PROD_DIR/.git" ]; then
                  echo "Error: $PROD_DIR exists and is non-empty but is not a git checkout."
                  exit 1
                fi
                git clone "$REPO_URL" "$PROD_DIR"
              fi
            fi

            echo "Deploying Production to $PROD_DIR..."
            
            cd "$PROD_DIR"

            # 1. Pull latest code
            echo "--> Checking out branch main in $PROD_DIR"
            cd "$PROD_DIR"
            git config --global --add safe.directory "$PROD_DIR"
            git fetch origin main
            git reset --hard origin/main
            
            echo "--> Transferring ownership to service user before dependency sync..."
            sudo chown -R ua:ua "$PROD_DIR"

            echo "--> Preparing production Infisical bootstrap..."
            export INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'
            export INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'
            export INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'
            export PATH="$HOME/.local/bin:/home/ua/.local/bin:/usr/local/bin:$PATH"

            run_as_ua() {
              ua_home=$(getent passwd ua | cut -d: -f6)
              if [ -z "$ua_home" ]; then
                ua_home='/home/ua'
              fi
              if command -v sudo >/dev/null 2>&1; then
                sudo -H -u ua env HOME="$ua_home" /bin/bash -lc "$1"
              elif command -v runuser >/dev/null 2>&1; then
                runuser -u ua -- env HOME="$ua_home" /bin/bash -lc "$1"
              else
                HOME="$ua_home" /bin/bash -lc "$1"
              fi
            }

            echo "--> Checking whether the existing venv is usable by ua..."
            if [ -e "$PROD_DIR/.venv/bin/python3" ]; then
              if ! run_as_ua "readlink -f \"$PROD_DIR/.venv/bin/python3\" >/dev/null 2>&1"; then
                echo "--> Existing venv interpreter is not accessible to ua; removing stale .venv for clean rebuild..."
                sudo rm -rf "$PROD_DIR/.venv"
              fi
            fi
            
            # 2. Dependency Sync
            echo "--> Ensuring Python 3.12 runtime for uv..."
            export PATH="$HOME/.local/bin:/home/ua/.local/bin:/usr/local/bin:$PATH"
            run_as_ua "export PATH=\"$PATH\"; uv python install 3.12"

            echo "--> Writing clean production bootstrap .env..."
            export PROD_DIR
            python3 -c "from pathlib import Path; import json, os; env_path = Path(os.environ['PROD_DIR']) / '.env'; bootstrap = {'INFISICAL_CLIENT_ID': os.environ['INFISICAL_CLIENT_ID'], 'INFISICAL_CLIENT_SECRET': os.environ['INFISICAL_CLIENT_SECRET'], 'INFISICAL_PROJECT_ID': os.environ['INFISICAL_PROJECT_ID'], 'INFISICAL_ENVIRONMENT': 'production', 'UA_RUNTIME_STAGE': 'production', 'FACTORY_ROLE': 'HEADQUARTERS', 'UA_DEPLOYMENT_PROFILE': 'vps', 'UA_MACHINE_SLUG': 'vps-hq-production', 'UA_INFISICAL_ENABLED': '1'}; env_path.write_text(''.join(f'{key}={json.dumps(str(value))}\n' for key, value in bootstrap.items()), encoding='utf-8')"
            sudo chown ua:ua "$PROD_DIR/.env"
            sudo chmod 600 "$PROD_DIR/.env"

            echo "--> Syncing dependencies with uv..."
            run_as_ua "export PATH=\"$PATH\"; uv sync --python 3.12 --no-install-package manim --no-install-package pycairo --no-install-package manimpango"

            echo "--> Validating production runtime bootstrap..."
            run_as_ua "export PATH=\"$PATH\"; cd $PROD_DIR && export PYTHONPATH=src && ./.venv/bin/python scripts/validate_runtime_bootstrap.py --profile vps --expect-environment production --expect-runtime-stage production --expect-factory-role HEADQUARTERS --expect-deployment-profile vps --expect-machine-slug vps-hq-production --require UA_OPS_TOKEN --json"

            echo "--> Installing NotebookLM CLI/MCP tool for ua..."
            run_as_ua "export PATH=\"$PATH\"; uv tool install --force notebooklm-mcp-cli"
            run_as_ua "export PATH=\"$PATH\"; command -v nlm && command -v notebooklm-mcp"
            
            echo "--> Building web-ui Next.js application..."
            run_as_ua "export PATH=\"$PATH\"; if [ -d \"$PROD_DIR/web-ui\" ] && command -v npm >/dev/null 2>&1; then cd \"$PROD_DIR/web-ui\" && npm install && npm run build; else echo 'WARN: web-ui or npm missing, skipping web build'; fi"
            
            # 3. Restart Systemd Services
            echo "--> Restarting production services..."
            if command -v systemctl >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo systemctl restart universal-agent-gateway universal-agent-api universal-agent-webui universal-agent-telegram
              else
                systemctl restart universal-agent-gateway universal-agent-api universal-agent-webui universal-agent-telegram
              fi
            elif command -v service >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo service universal-agent-gateway restart
                sudo service universal-agent-api restart
                sudo service universal-agent-webui restart
                sudo service universal-agent-telegram restart
              else
                service universal-agent-gateway restart
                service universal-agent-api restart
                service universal-agent-webui restart
                service universal-agent-telegram restart
              fi
            else
              echo "WARNING: No supported service manager found (systemctl/service); skipping restart."
            fi
            
            echo "Deployment to Production complete!"
          EOF
