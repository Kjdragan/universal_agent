name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Deploy to Production VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "--> SSH preflight (non-interactive check)..."
          set +e
          timeout 60s ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "echo SSH_OK" >/tmp/ssh_preflight.out 2>/tmp/ssh_preflight.err
          preflight_status=$?
          set -e

          if [ "$preflight_status" -ne 0 ]; then
            echo "ERROR: SSH preflight failed with status $preflight_status"
            cat /tmp/ssh_preflight.err || true
            if grep -Eqi "additional check|login\\.tailscale\\.com" /tmp/ssh_preflight.err; then
              echo "::error::Tailscale SSH interactive check detected. Ensure CI identity tag (tag:ci-gha) has SSH action=accept to target tag (tag:vps)."
            fi
            exit "$preflight_status"
          fi

          if ! grep -q "^SSH_OK$" /tmp/ssh_preflight.out; then
            echo "ERROR: SSH preflight succeeded but did not return expected marker."
            cat /tmp/ssh_preflight.out || true
            exit 1
          fi

          rm -f /tmp/ssh_preflight.out /tmp/ssh_preflight.err
          
          timeout 15m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" << 'EOF'
            # Exit immediately on error
            set -euo pipefail
            
            resolve_prod_dir() {
              for candidate in /opt/universal_agent /opt/universal-agent /home/ua/universal_agent /home/ua/universal-agent; do
                if [ -d "$candidate/.git" ]; then
                  echo "$candidate"
                  return 0
                fi
              done
              return 1
            }

            PROD_DIR="$(resolve_prod_dir || true)"
            if [ -z "$PROD_DIR" ]; then
              echo "Error: Production repository not found in expected paths:"
              echo "  - /opt/universal_agent"
              echo "  - /opt/universal-agent"
              echo "  - /home/ua/universal_agent"
              echo "  - /home/ua/universal-agent"
              exit 1
            fi

            echo "Deploying Production to $PROD_DIR..."
            
            cd "$PROD_DIR"

            run_as_ua() {
              if command -v sudo >/dev/null 2>&1; then
                sudo -u ua /bin/bash -lc "$1"
              elif command -v runuser >/dev/null 2>&1; then
                runuser -u ua -- /bin/bash -lc "$1"
              else
                /bin/bash -lc "$1"
              fi
            }

            echo "--> Ensuring Python 3.12 runtime for uv..."
            run_as_ua "export PATH=\"/home/ua/.local/bin:/usr/local/bin:$PATH\"; uv python install 3.12"
            
            # 1. Pull latest code
            echo "--> Fetching and pulling latest main branch..."
            run_as_ua "cd $PROD_DIR && git fetch origin && git checkout main && git pull origin main"
            
            # Note: We do NOT auto-provision production secrets from dev. 
            # Production secrets (in prod-hq) should be curated manually or via an explicit sync script.
            
            # 2. Dependency Sync
            echo "--> Syncing dependencies with uv..."
            run_as_ua "export PATH=\"/home/ua/.local/bin:/usr/local/bin:$PATH\"; cd $PROD_DIR && uv sync --python 3.12 --no-install-package manim --no-install-package pycairo --no-install-package manimpango"
            
            # 3. Restart Systemd Services
            echo "--> Restarting production services..."
            if command -v systemctl >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo systemctl restart universal-agent-gateway universal-agent-api universal-agent-webui universal-agent-telegram
              else
                systemctl restart universal-agent-gateway universal-agent-api universal-agent-webui universal-agent-telegram
              fi
            elif command -v service >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo service universal-agent-gateway restart
                sudo service universal-agent-api restart
                sudo service universal-agent-webui restart
                sudo service universal-agent-telegram restart
              else
                service universal-agent-gateway restart
                service universal-agent-api restart
                service universal-agent-webui restart
                service universal-agent-telegram restart
              fi
            else
              echo "WARNING: No supported service manager found (systemctl/service); skipping restart."
            fi
            
            echo "Deployment to Production complete!"
          EOF
