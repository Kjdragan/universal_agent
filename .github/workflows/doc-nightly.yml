name: Nightly Documentation Health

# Replaces the legacy nightly-doc-drift-audit.yml (24h git-co-change heuristic +
# fragile Tailscale->VPS->gateway dispatch). Two jobs:
#   1. deterministic-health — full-corpus link/symbol/frontmatter audit (stdlib, no LLM).
#   2. accuracy-sweep — LLM doc-vs-code judge over the oldest-verified batch, routed
#      through the ZAI proxy / GLM models (resolve_sonnet -> glm-5-turbo) via the same
#      Infisical-injected ANTHROPIC_*->ZAI mapping the UA services use. No Anthropic spend,
#      no new secret. Opens a GH issue when drift is found; never fails the run.
#
# Schedule: 06:35 UTC ~= 1:35 AM CT (operator request 2026-06-10: run overnight so the
# desktop dark-factory session triages/fixes on idle Max quota and results are merged by
# morning). Fixed-time crons are exempt from the operating-hours dormancy default — only
# interval crons must stay inside the 6a-10p window (the prior 18:35 UTC slot over-applied
# that policy).

on:
  schedule:
    - cron: '35 6 * * *'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'How many oldest-verified docs to list for accuracy review'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  deterministic-health:
    name: Full-corpus deterministic audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Deterministic audit (links, symbol refs, frontmatter, no line numbers)
        run: python scripts/doc_audit.py --warn-only | tee "$GITHUB_STEP_SUMMARY"
      - name: README index staleness
        run: python scripts/gen_doc_index.py --check || echo "::warning::README index is stale — run scripts/gen_doc_index.py"
      - name: Emit rotating accuracy-sweep batch (oldest last_verified first)
        env:
          BATCH: ${{ github.event.inputs.batch_size || '10' }}
        run: |
          echo "### Accuracy-sweep candidates (oldest verified)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          python scripts/doc_audit.py --accuracy-batch "$BATCH" | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_The accuracy-sweep job (below) judges this batch via ZAI/GLM._" >> "$GITHUB_STEP_SUMMARY"

  accuracy-sweep:
    name: LLM accuracy sweep (ZAI / GLM)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: deterministic-health
    # Skipped automatically on forks / where Infisical creds are absent (the script
    # exits 0 with a warning). Never fails the nightly — drift is reported, not enforced.
    permissions:
      contents: read
      issues: write
    steps:
      # Default checkout (persist-credentials true). NOTE: persist-credentials:false
      # breaks here — it makes checkout resolve a pre-existing broken submodule gitlink
      # (.claude/agents/agent-browser, absent from .gitmodules) and exit 128. The PAT
      # push below neutralizes the persisted GITHUB_TOKEN extraheader inline instead.
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - name: Install project deps
        run: uv sync --frozen --python 3.12 --no-install-package manim --no-install-package pycairo --no-install-package manimpango
      - name: ZAI-backed doc-accuracy sweep (opens a GH issue on drift; stamps accurate docs)
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          INFISICAL_ENVIRONMENT: development
          UA_RUNTIME_STAGE: development
          UA_INFISICAL_ENABLED: '1'
          GH_TOKEN: ${{ github.token }}
          BATCH: ${{ github.event.inputs.batch_size || '10' }}
        run: uv run --no-sync python scripts/doc_accuracy_sweep.py --batch "$BATCH" --open-issue --stamp
      - name: Open rotation PR if any docs were re-verified
        if: ${{ always() }}
        env:
          AUTO_MERGE_PAT: ${{ secrets.AUTO_MERGE_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain project_docs/)" ]; then
            echo "No last_verified bumps this run — queue unchanged, nothing to commit."
            exit 0
          fi
          if [ -z "${AUTO_MERGE_PAT:-}" ]; then
            echo "::warning::AUTO_MERGE_PAT not set — leaving stamps uncommitted (rotation will not advance)."
            git checkout -- project_docs/ || true
            exit 0
          fi
          BR="docfix/nightly-rotation-${RUN_ID}"
          git config user.name  "ua-doc-bot"
          git config user.email "ua-doc-bot@users.noreply.github.com"
          git checkout -b "$BR"
          git add project_docs/
          git commit -m "docs(rotation): stamp last_verified on docs that passed the nightly accuracy sweep" -m "Automated by doc-nightly.yml so build_accuracy_batch advances through the corpus instead of re-judging the oldest batch nightly. Docs-only; auto-merges."
          # Clear the GITHUB_TOKEN extraheader checkout persisted (it would otherwise
          # override the PAT and push as the read-only GITHUB_TOKEN -> 403).
          PUSH_URL="https://x-access-token:${AUTO_MERGE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git -c http.https://github.com/.extraheader= push "$PUSH_URL" "HEAD:refs/heads/${BR}"
          # gh pr create needs the PAT to carry "Pull requests: write". If it doesn't
          # (GraphQL "Resource not accessible by personal access token"), don't fail the
          # nightly or leave an orphan branch — warn, delete the branch, exit clean. The
          # moment the PAT gains PR-write, rotation PRs flow with no further change.
          if GH_TOKEN="$AUTO_MERGE_PAT" gh pr create --base main --head "$BR" \
               --title "docs(rotation): nightly last_verified stamps" \
               --body "Automated rotation: docs that passed tonight's ZAI/GLM accuracy sweep get \`last_verified\` bumped so the sweep advances through the corpus (~10/night) instead of re-judging the oldest batch forever. Docs-only — auto-merges via pr-auto-merge; the docfix/* tripwire enforces docs-only."; then
            echo "Opened rotation PR for $BR."
          else
            echo "::warning::gh pr create failed — AUTO_MERGE_PAT likely lacks 'Pull requests: write'. Deleting pushed branch $BR to avoid orphans. Grant the PAT PR-write to enable nightly rotation PRs (stamps were computed but not persisted this run)."
            git -c http.https://github.com/.extraheader= push "$PUSH_URL" --delete "${BR}" || true
          fi
