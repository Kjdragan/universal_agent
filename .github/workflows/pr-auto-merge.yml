name: PR Auto-Merge

# Auto-enable GitHub auto-merge on non-draft PRs targeting main,
# EXCEPT branches that need human review before merging:
#
#   codie/*   — Codie (autonomous code-writer) PRs need operator review
#   kevin/*   — operator-authored PRs, manual merge
#   feature/* — operator-authored PRs, manual merge
#
# Everything else (claude/*, worktree-*, fix/*, docs/*, etc.) auto-merges
# once pr-validate.yml passes. Safety is in CI, not in branch naming.
#
# AUTHORITATIVE branch policy (keep this + pr-rebase-watchdog.yml in sync):
#   project_docs/06_platform/04_deployment_and_cicd.md § "Branch policy — single source of truth"
#
# EXCEPTION — the `ci-autofix` label (2026-05-30): a PR carrying that label
# auto-merges regardless of branch prefix (including codie/*). The label is
# applied ONLY by the autonomous CI-failure auto-fix loop (Simone's heartbeat
# CI/CD Health monitor dispatches a Cody fix and has it self-label). Rationale:
# a CI-fix is self-gating — it has to make pr-validate + GitGuardian green to
# merge — so auto-merging it is safe AND necessary (otherwise a codie/* fix PR
# sits unmerged for hours and the dark-factory loop never closes). General
# codie/* PRs (no label) still require manual review.
#
# History:
# 2026-05-11: Original — only triggered for claude/* heads.
# 2026-05-15: Added codie/* after Codie PRs sat green-CI but unmerged.
# 2026-05-17: Rewrote with inverted logic after worktree-* branches
#             silently fell through the allowlist (PR #316 incident).
#             Operator then clarified: Codie PRs should NOT auto-merge —
#             keep them for review. All other non-operator branches do.
# 2026-05-30: Added the `ci-autofix` label exception + `labeled` trigger to
#             close the autonomous CI-failure fix loop.

on:
  pull_request_target:
    # `labeled` so applying `ci-autofix` to an existing codie/* PR re-evaluates
    # and enables auto-merge.
    types: [opened, reopened, synchronize, ready_for_review, labeled]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    name: Enable auto-merge (squash)
    # Auto-merge when NOT a draft AND either:
    #   (a) the branch is not an operator/Codie-review branch, OR
    #   (b) the PR carries the `ci-autofix` label (autonomous CI-fix override).
    if: |
      !github.event.pull_request.draft && (
        (
          !startsWith(github.event.pull_request.head.ref, 'codie/') &&
          !startsWith(github.event.pull_request.head.ref, 'kevin/') &&
          !startsWith(github.event.pull_request.head.ref, 'feature/')
        ) ||
        contains(github.event.pull_request.labels.*.name, 'ci-autofix')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge via gh
        env:
          # AUTO_MERGE_PAT (not GITHUB_TOKEN) so the downstream squash-merge
          # push event fires deploy.yml. GITHUB_TOKEN-triggered events don't
          # chain to new workflow runs. Falls back to GITHUB_TOKEN if the
          # secret is absent (workflow stays functional; deploy won't auto-fire).
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number }}"
          if gh pr merge "$PR_NUM" \
                --auto --squash --delete-branch \
                --repo "${{ github.repository }}"; then
            echo "Auto-merge enabled on PR #${PR_NUM} (squash, delete branch)."
          else
            echo "Note: auto-merge could not be (re-)enabled on PR #${PR_NUM}."
            echo "      Usually: already merged, already auto-merging, or"
            echo "      auto-merge disabled in repo Settings -> General."
          fi
