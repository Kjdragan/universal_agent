name: PR Auto-Merge

# Auto-enable GitHub auto-merge on ALL non-draft PRs targeting main.
#
# Once auto-merge is enabled, GitHub squash-merges the PR as soon as
# pr-validate.yml passes. The squash-merge triggers deploy.yml -> production.
#
# Safety is provided by pr-validate.yml (py_compile + ruff + pytest tests/unit),
# not by branch-name filtering. If a PR passes CI it ships.
#
# History:
# 2026-05-11: Original version — only triggered for claude/* heads.
# 2026-05-15: Added codie/* after Codie PRs sat merged-but-undeployed.
# 2026-05-17: Inverted to exclude-operator logic (kevin/*, feature/*).
# 2026-05-17: Removed all branch filters. Operator confirmed: auto-merge
#             everything that passes CI. No manual PR review needed.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

permissions:
  pull-requests: write
  contents: write

jobs:
  enable-automerge:
    name: Enable auto-merge (squash)
    if: "!github.event.pull_request.draft"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enable auto-merge via gh
        env:
          # AUTO_MERGE_PAT (not GITHUB_TOKEN) so the downstream squash-merge
          # push event fires deploy.yml. GITHUB_TOKEN-triggered events don't
          # chain to new workflow runs. Falls back to GITHUB_TOKEN if the
          # secret is absent (workflow stays functional; deploy won't auto-fire).
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUM="${{ github.event.pull_request.number }}"
          if gh pr merge "$PR_NUM" \
                --auto --squash --delete-branch \
                --repo "${{ github.repository }}"; then
            echo "Auto-merge enabled on PR #${PR_NUM} (squash, delete branch)."
          else
            echo "Note: auto-merge could not be (re-)enabled on PR #${PR_NUM}."
            echo "      Usually: already merged, already auto-merging, or"
            echo "      auto-merge disabled in repo Settings -> General."
          fi
