name: PR Validate

# Lightweight gate that runs on every PR. Catches the class of failure
# from the 2026-05-07 import storm: a syntax error introduced by an
# autonomous patcher that nothing checked before deploy.
#
# Three gates:
#   1. py_compile every changed .py file (catches the SyntaxError class)
#   2. ruff check (catches obvious lint issues)
#   3. pytest tests/unit -x -q (fast unit tests on the changed modules)
#
# All three must pass before a PR can be merged. Branch protection on
# the GitHub side is what enforces this; this workflow is what produces
# the "passing" check.

on:
  pull_request:
    # `develop` was retired 2026-05-10 — see PR retiring it. Merge model is
    # now: <any-branch> → PR → CI → merge to `main` → deploy. `feature/latest2`
    # remains in the list as a transitional convenience for the existing
    # operator workflow; new bot/Claude branches PR directly to `main`.
    branches:
      - feature/latest2
      - main
  # Allow manual re-run from the Actions tab if a flaky test fails.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # One run per PR. Cancel in-flight runs when a new commit lands.
  group: pr-validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Force pipefail on every `run:` block. Without this, lines like
    # `pytest ... 2>&1 | tail -50` silently exit 0 because `tail`'s
    # exit code wins the pipeline. That bug masked 12 pre-existing
    # pytest failures (and a `uv sync` failure) for hours on PR #153
    # before being diagnosed. GitHub Actions' default shell is
    # `bash -e {0}` (no pipefail) — we have to opt in.
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          # Need full history so we can diff against the base branch
          # to identify only the .py files this PR touches.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          # 3.12, not 3.13 — `infisical-python==2.3.5` only ships
          # cp312 wheels for `manylinux_2_28_x86_64`, no cp313 wheel
          # exists, and the source build needs PyO3 ≥ 0.22 (it pins
          # 0.20.3, which doesn't support 3.13). This bit us on
          # PR #153, the first PR to exercise this workflow end-to-end.
          # Production runtime is also 3.12 — see `.python-version`.
          python-version: '3.12'

      - name: Install uv
        run: pip install --quiet uv

      - name: Install project dependencies
        run: uv sync --frozen --no-progress 2>&1 | tail -5

      - name: Identify changed Python files
        id: changed
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1
          CHANGED=$(git diff --name-only --diff-filter=AMR "origin/$BASE_REF...HEAD" -- '*.py' || true)
          if [ -z "$CHANGED" ]; then
            echo "No Python files changed; skipping py_compile + targeted tests."
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed Python files:"
            echo "$CHANGED" | sed 's/^/  /'
            # Pass as space-separated for downstream steps.
            echo "files=$(echo "$CHANGED" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Syntax check every changed .py file
        if: steps.changed.outputs.files != ''
        run: |
          # This step would have caught the 2026-05-07 durable/state.py
          # syntax error in seconds. compile() raises SyntaxError on the
          # exact file + line, which fails the workflow. Cheaper than
          # ruff or pytest.
          set -e
          for f in ${{ steps.changed.outputs.files }}; do
            echo "  py_compile $f"
            uv run python -c "compile(open('$f').read(), '$f', 'exec')"
          done
          echo "All changed .py files compile cleanly."

      - name: Block .bak / .swp / .orig artifacts
        run: |
          # Autonomous patchers (e.g., CODIE's docstring tool) sometimes
          # leave .bak files behind. Refuse to land a PR that has these.
          STRAY=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD | grep -E '\.(py\.bak|swp|orig)$' || true)
          if [ -n "$STRAY" ]; then
            echo "Refusing to merge: PR contains stray patcher artifacts:"
            echo "$STRAY" | sed 's/^/  /'
            echo "Remove these files and push again."
            exit 1
          fi

      - name: Ruff check (changed files only, errors-only gate)
        if: steps.changed.outputs.files != ''
        run: |
          # Scope: only the .py files this PR changes. Same scope as the
          # syntax-check step above. The whole-repo run that lived here
          # was masked by the pipe-to-tail bug for months — once that
          # bug was fixed in the same PR that introduced this scoping,
          # whole-repo ruff revealed ~8000 pre-existing rot findings
          # (F405 from star imports, F541 empty f-strings, F841 unused
          # locals). Cleaning that up is its own multi-PR effort. For
          # PR validation we tighten the gate on new code only and let
          # the legacy rot be tackled separately.
          # Errors only (E9 + F minus codebase-wide ignores from
          # pyproject.toml). Style-class findings stay non-blocking.
          # --ignore broadens to cover the rot classes the workflow comment
          # above already named (F541 empty f-strings, F841 unused locals)
          # but were never added to the ignore list. F821 (undefined name)
          # stays selected — it's a real-bug signal. Specific defensive
          # globals() patterns and pre-existing F821 bugs in
          # gateway_server.py carry surgical `# noqa: F821` annotations
          # with TODO comments at their sites instead.
          uv run ruff check \
            --select E9,F \
            --ignore E402,F401,F541,F811,F841 \
            --no-cache \
            ${{ steps.changed.outputs.files }} 2>&1 | tail -50

      - name: Run unit tests
        run: |
          # tests/unit is the fast subset. Full suite runs nightly.
          if [ -d tests/unit ]; then
            uv run pytest tests/unit -x -q --no-header 2>&1 | tail -50
          else
            echo "No tests/unit directory; skipping."
          fi

      - name: Summary
        if: always()
        run: |
          echo "PR validation finished. See individual step results above."
