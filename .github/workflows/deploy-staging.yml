name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Deploy to Staging VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          echo "--> Validating SSH Key Fingerprint..."
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "ERROR: SSH Key is invalid or malformed!"
          ssh-keygen -y -f ~/.ssh/deploy_key
          
          echo "--> Checking connectivity to VPS ($SSH_HOST)..."
          ping -c 3 "$SSH_HOST" || echo "Ping failed, continuing..."

          echo "--> SSH preflight (non-interactive check)..."
          set +e
          timeout 60s ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "echo SSH_OK" >/tmp/ssh_preflight.out 2>/tmp/ssh_preflight.err
          preflight_status=$?
          set -e

          if [ "$preflight_status" -ne 0 ]; then
            echo "ERROR: SSH preflight failed with status $preflight_status"
            cat /tmp/ssh_preflight.err || true
            if grep -Eqi "additional check|login\\.tailscale\\.com" /tmp/ssh_preflight.err; then
              echo "::error::Tailscale SSH interactive check detected. Ensure CI identity tag (tag:ci-gha) has SSH action=accept to target tag (tag:vps)."
            fi
            exit "$preflight_status"
          fi

          if ! grep -q "^SSH_OK$" /tmp/ssh_preflight.out; then
            echo "ERROR: SSH preflight succeeded but did not return expected marker."
            cat /tmp/ssh_preflight.out || true
            exit 1
          fi

          rm -f /tmp/ssh_preflight.out /tmp/ssh_preflight.err

          timeout 15m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            STAGING_DIR='/opt/universal-agent-staging'
            echo '--> Pulling latest code...'
            cd \$STAGING_DIR
            git fetch origin develop
            git reset --hard origin/develop
            
            echo '--> Provisioning Infisical environment...'
            export INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'
            export INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'
            export INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'
            export PATH='/home/ua/.local/bin:/usr/local/bin:\$PATH'

            run_as_ua() {
              if command -v sudo >/dev/null 2>&1; then
                sudo -u ua /bin/bash -lc \"\$1\"
              elif command -v runuser >/dev/null 2>&1; then
                runuser -u ua -- /bin/bash -lc \"\$1\"
              else
                /bin/bash -lc \"\$1\"
              fi
            }

            run_as_root() {
              if [ \"\$(id -u)\" -eq 0 ]; then
                /bin/bash -lc \"\$1\"
              elif command -v sudo >/dev/null 2>&1; then
                sudo /bin/bash -lc \"\$1\"
              else
                /bin/bash -lc \"\$1\"
              fi
            }

            ensure_native_build_deps() {
              if command -v cc >/dev/null 2>&1 && command -v pkg-config >/dev/null 2>&1; then
                return 0
              fi

              echo '--> Installing native build prerequisites...'
              if command -v apt-get >/dev/null 2>&1; then
                run_as_root \"export DEBIAN_FRONTEND=noninteractive; apt-get update && apt-get install -y build-essential pkg-config libcairo2-dev libpango1.0-dev\"
              elif command -v dnf >/dev/null 2>&1; then
                run_as_root \"dnf install -y gcc gcc-c++ make pkgconf-pkg-config cairo-devel pango-devel redhat-rpm-config\"
              elif command -v yum >/dev/null 2>&1; then
                run_as_root \"yum install -y gcc gcc-c++ make pkgconfig cairo-devel pango-devel redhat-rpm-config\"
              elif command -v apk >/dev/null 2>&1; then
                run_as_root \"apk add --no-cache build-base pkgconf cairo-dev pango-dev\"
              else
                echo 'ERROR: No supported package manager found to install C build dependencies.'
                return 1
              fi

              if ! command -v cc >/dev/null 2>&1; then
                echo 'ERROR: C compiler is still missing after dependency install.'
                return 1
              fi
            }

            ensure_native_build_deps

            echo '--> Ensuring Python build tooling (maturin)...'
            run_as_ua \"export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; command -v maturin >/dev/null 2>&1 || uv tool install maturin\"

            echo '--> Ensuring Rust build tooling (cargo/rustc)...'
            run_as_ua \"export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; command -v cargo >/dev/null 2>&1 || (command -v curl >/dev/null 2>&1 && curl https://sh.rustup.rs -sSf | sh -s -- -y)\"
            if ! run_as_ua \"export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; command -v cargo >/dev/null 2>&1\"; then
              echo 'ERROR: cargo bootstrap failed.'
              exit 1
            fi

            echo '--> Ensuring Python 3.12 runtime for uv...'
            run_as_ua \"export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; uv python install 3.12\"
            
            run_as_ua \"export INFISICAL_CLIENT_ID='\$INFISICAL_CLIENT_ID'; export INFISICAL_CLIENT_SECRET='\$INFISICAL_CLIENT_SECRET'; export INFISICAL_PROJECT_ID='\$INFISICAL_PROJECT_ID'; export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; cd \$STAGING_DIR && uv run --python 3.12 scripts/infisical_provision_factory_env.py --machine-name 'Staging VPS HQ' --machine-slug staging-hq --factory-role HEADQUARTERS --source-env dev\"
            
            echo '--> Creating bootstrap .env file...'
            run_as_ua \"echo \\\"INFISICAL_CLIENT_ID='\$INFISICAL_CLIENT_ID'\\\" > \$STAGING_DIR/.env\"
            run_as_ua \"echo \\\"INFISICAL_CLIENT_SECRET='\$INFISICAL_CLIENT_SECRET'\\\" >> \$STAGING_DIR/.env\"
            run_as_ua \"echo \\\"INFISICAL_PROJECT_ID='\$INFISICAL_PROJECT_ID'\\\" >> \$STAGING_DIR/.env\"
            run_as_ua \"echo \\\"INFISICAL_ENVIRONMENT='staging-hq'\\\" >> \$STAGING_DIR/.env\"
            run_as_ua \"echo \\\"UA_INFISICAL_ENABLED=1\\\" >> \$STAGING_DIR/.env\"
            
            echo '--> Syncing dependencies with uv...'
            run_as_ua \"export PATH='/home/ua/.cargo/bin:\$HOME/.cargo/bin:/home/ua/.local/bin:/usr/local/bin:\$PATH'; cd \$STAGING_DIR && uv sync --python 3.12\"
            
            echo '--> Restarting staging services...'
            if command -v sudo >/dev/null 2>&1; then
              sudo systemctl restart universal-agent-staging-gateway universal-agent-staging-api
            else
              systemctl restart universal-agent-staging-gateway universal-agent-staging-api
            fi
            echo '--> Deployment complete!'
          "
