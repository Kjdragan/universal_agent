name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  connectivity-test:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Connectivity Diagnostics
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
        run: |
          echo "--> Testing Ping to $SSH_HOST..."
          ping -c 5 "$SSH_HOST"
          
          echo "--> Testing SSH Port 22..."
          nc -zv "$SSH_HOST" 22
          
          echo "--> Testing SSH Keyscan..."
          ssh-keyscan "$SSH_HOST"
