name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Deploy to Staging VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << 'EOF'
            # Exit immediately on error
            set -euo pipefail
            
            STAGING_DIR="/opt/universal-agent-staging"
            
            echo "Deploying Staging to $STAGING_DIR..."
            
            # Ensure the directory exists and has a git repo
            if [ ! -d "$STAGING_DIR/.git" ]; then
              echo "Error: Staging repository not found at $STAGING_DIR."
              echo "VPS must be prepared prior to first deployment."
              exit 1
            fi
            
            cd "$STAGING_DIR"
            
            # 1. Pull latest code
            echo "--> Fetching and pulling latest develop branch..."
            sudo -u ua bash -c "cd $STAGING_DIR && git fetch origin && git checkout develop && git pull origin develop"
            
            # 2. Provision Infisical Environment
            echo "--> Provisioning Infisical environment..."
            sudo -u ua bash -c "export INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'; export INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'; export INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'; export PATH='/home/ua/.local/bin:/usr/local/bin:$PATH'; cd $STAGING_DIR && uv run scripts/infisical_provision_factory_env.py --machine-name 'Staging VPS HQ' --machine-slug staging-hq --factory-role HEADQUARTERS --source-env dev"

            # 3. Create Bootstrap .env File
            echo "--> Creating bootstrap .env file..."
            sudo -u ua bash -c "echo \"INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'\" > $STAGING_DIR/.env"
            sudo -u ua bash -c "echo \"INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'\" >> $STAGING_DIR/.env"
            sudo -u ua bash -c "echo \"INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'\" >> $STAGING_DIR/.env"
            sudo -u ua bash -c "echo \"INFISICAL_ENVIRONMENT='staging-hq'\" >> $STAGING_DIR/.env"
            sudo -u ua bash -c "echo \"UA_INFISICAL_ENABLED=1\" >> $STAGING_DIR/.env"

            # 4. Sync Dependencies
            echo "--> Syncing dependencies with uv..."
            sudo -u ua bash -c "export PATH='/home/ua/.local/bin:/usr/local/bin:$PATH'; cd $STAGING_DIR && uv sync"
            
            # 5. Restart Systemd Services
            echo "--> Restarting staging services..."
            # Restart multiple staging services
            sudo systemctl restart universal-agent-staging-gateway universal-agent-staging-api
            
            echo "Deployment to Staging complete!"
          EOF
