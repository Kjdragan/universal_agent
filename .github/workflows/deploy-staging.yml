name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Deploy to Staging VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          echo "--> Validating SSH Key Fingerprint..."
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "ERROR: SSH Key is invalid or malformed!"
          ssh-keygen -y -f ~/.ssh/deploy_key
          
          echo "--> Checking connectivity to VPS ($SSH_HOST)..."
          ping -c 3 "$SSH_HOST" || echo "Ping failed, continuing..."

          echo "--> SSH preflight (non-interactive check)..."
          set +e
          timeout 60s ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "echo SSH_OK" >/tmp/ssh_preflight.out 2>/tmp/ssh_preflight.err
          preflight_status=$?
          set -e

          if [ "$preflight_status" -ne 0 ]; then
            echo "ERROR: SSH preflight failed with status $preflight_status"
            cat /tmp/ssh_preflight.err || true
            if grep -Eqi "additional check|login\\.tailscale\\.com" /tmp/ssh_preflight.err; then
              echo "::error::Tailscale SSH interactive check detected. Ensure CI identity tag (tag:ci-gha) has SSH action=accept to target tag (tag:vps)."
            fi
            exit "$preflight_status"
          fi

          if ! grep -q "^SSH_OK$" /tmp/ssh_preflight.out; then
            echo "ERROR: SSH preflight succeeded but did not return expected marker."
            cat /tmp/ssh_preflight.out || true
            exit 1
          fi

          rm -f /tmp/ssh_preflight.out /tmp/ssh_preflight.err

          timeout 15m ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            STAGING_DIR='/opt/universal-agent-staging'
            echo '--> Pulling latest code...'
            cd \$STAGING_DIR
            git fetch origin develop
            git reset --hard origin/develop

            echo '--> Transferring ownership to service user before dependency sync...'
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R ua:ua \$STAGING_DIR
            else
              chown -R ua:ua \$STAGING_DIR
            fi
            
            echo '--> Preparing Infisical bootstrap...'
            export INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'
            export INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'
            export INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'
            export PATH=\"/home/ua/.local/bin:/usr/local/bin:/usr/bin:/bin:\$PATH\"

            run_as_ua() {
              ua_home=\$(getent passwd ua | cut -d: -f6)
              if [ -z \"\$ua_home\" ]; then
                ua_home='/home/ua'
              fi
              if command -v sudo >/dev/null 2>&1; then
                sudo -H -u ua env HOME=\"\$ua_home\" /bin/bash -lc \"\$1\"
              elif command -v runuser >/dev/null 2>&1; then
                runuser -u ua -- env HOME=\"\$ua_home\" /bin/bash -lc \"\$1\"
              else
                HOME=\"\$ua_home\" /bin/bash -lc \"\$1\"
              fi
            }

            echo '--> Checking whether the existing venv is usable by ua...'
            if [ -e \"\$STAGING_DIR/.venv/bin/python3\" ]; then
              if ! run_as_ua \"readlink -f \\\"\$STAGING_DIR/.venv/bin/python3\\\" >/dev/null 2>&1\"; then
                echo '--> Existing venv interpreter is not accessible to ua; removing stale .venv for clean rebuild...'
                if command -v sudo >/dev/null 2>&1; then
                  sudo rm -rf \"\$STAGING_DIR/.venv\"
                else
                  rm -rf \"\$STAGING_DIR/.venv\"
                fi
              fi
            fi

            echo '--> Ensuring Python 3.12 runtime for uv...'
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:\$PATH\\\"; uv python install 3.12\"

            echo '--> Writing clean staging bootstrap .env...'
            export STAGING_DIR
            python3 -c \"from pathlib import Path; import json, os; env_path = Path(os.environ['STAGING_DIR']) / '.env'; bootstrap = {'INFISICAL_CLIENT_ID': os.environ['INFISICAL_CLIENT_ID'], 'INFISICAL_CLIENT_SECRET': os.environ['INFISICAL_CLIENT_SECRET'], 'INFISICAL_PROJECT_ID': os.environ['INFISICAL_PROJECT_ID'], 'INFISICAL_ENVIRONMENT': 'staging', 'UA_RUNTIME_STAGE': 'staging', 'FACTORY_ROLE': 'HEADQUARTERS', 'UA_DEPLOYMENT_PROFILE': 'vps', 'UA_MACHINE_SLUG': 'vps-hq-staging', 'UA_INFISICAL_ENABLED': '1', 'UA_GATEWAY_PORT': '9002', 'UA_API_PORT': '9001', 'UA_GATEWAY_URL': 'http://127.0.0.1:9002', 'UA_ARTIFACTS_DIR': '/opt/universal_agent/artifacts'}; env_path.write_text(''.join(f'{key}={json.dumps(str(value))}\\n' for key, value in bootstrap.items()), encoding='utf-8')\"
            if command -v sudo >/dev/null 2>&1; then
              sudo chown ua:ua "\$STAGING_DIR/.env"
              sudo chmod 600 "\$STAGING_DIR/.env"
            else
              chown ua:ua "\$STAGING_DIR/.env"
              chmod 600 "\$STAGING_DIR/.env"
            fi

            echo '--> Syncing dependencies with uv...'
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:\$PATH\\\"; cd \$STAGING_DIR && uv sync --python 3.12 --no-install-package manim --no-install-package pycairo --no-install-package manimpango\"

            echo '--> Validating staging runtime bootstrap...'
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:\$PATH\\\"; cd \$STAGING_DIR && export PYTHONPATH=src && ./.venv/bin/python scripts/validate_runtime_bootstrap.py --profile vps --expect-environment staging --expect-runtime-stage staging --expect-factory-role HEADQUARTERS --expect-deployment-profile vps --expect-machine-slug vps-hq-staging --require UA_OPS_TOKEN --json\"

            echo '--> Installing NotebookLM CLI/MCP tool for ua...'
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:\$PATH\\\"; uv tool install --force notebooklm-mcp-cli\"
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:\$PATH\\\"; command -v nlm && command -v notebooklm-mcp\"
            
            echo '--> Building web-ui Next.js application (staging config — API port 9002)...'
            run_as_ua \"export PATH=\\\"\$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:\$PATH\\\"; if [ -d \\\"\$STAGING_DIR/web-ui\\\" ] && command -v npm >/dev/null 2>&1; then cd \\\"\$STAGING_DIR/web-ui\\\" && [ -f next.config.staging.js ] && cp next.config.staging.js next.config.js; npm install && npm run build; else echo 'WARN: web-ui or npm missing, skipping web build'; fi\"
            
            echo '--> Restarting staging services...'
            if command -v systemctl >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo systemctl restart universal-agent-staging-gateway universal-agent-staging-api
                sudo systemctl restart universal-agent-staging-webui || echo 'WARN: staging-webui unit not yet installed; run one-time setup on VPS'
              else
                systemctl restart universal-agent-staging-gateway universal-agent-staging-api
                systemctl restart universal-agent-staging-webui || echo 'WARN: staging-webui unit not yet installed'
              fi
            elif command -v service >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo service universal-agent-staging-gateway restart
                sudo service universal-agent-staging-api restart
                sudo service universal-agent-staging-webui restart || echo 'WARN: staging-webui service not yet installed'
              else
                service universal-agent-staging-gateway restart
                service universal-agent-staging-api restart
                service universal-agent-staging-webui restart || echo 'WARN: staging-webui service not yet installed'
              fi
            else
              echo '--> WARNING: No supported service manager found (systemctl/service); skipping restart.'
            fi
            echo '--> Deployment complete!'
          "
