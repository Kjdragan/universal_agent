name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          
      - name: Deploy to Staging VPS via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          echo "--> Validating SSH Key Fingerprint..."
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "ERROR: SSH Key is invalid or malformed!"
          ssh-keygen -y -f ~/.ssh/deploy_key
          
          echo "--> Checking connectivity to VPS ($SSH_HOST)..."
          ping -c 3 "$SSH_HOST" || echo "Ping failed, continuing..."

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$SSH_USER@$SSH_HOST" "
            set -euo pipefail
            STAGING_DIR='/opt/universal-agent-staging'
            echo '--> Pulling latest code...'
            cd \$STAGING_DIR
            git fetch origin develop
            git reset --hard origin/develop
            
            echo '--> Provisioning Infisical environment...'
            export INFISICAL_CLIENT_ID='${{ secrets.INFISICAL_CLIENT_ID }}'
            export INFISICAL_CLIENT_SECRET='${{ secrets.INFISICAL_CLIENT_SECRET }}'
            export INFISICAL_PROJECT_ID='${{ secrets.INFISICAL_PROJECT_ID }}'
            export PATH='/home/ua/.local/bin:/usr/local/bin:\$PATH'
            
            sudo -u ua bash -c \"export INFISICAL_CLIENT_ID='\$INFISICAL_CLIENT_ID'; export INFISICAL_CLIENT_SECRET='\$INFISICAL_CLIENT_SECRET'; export INFISICAL_PROJECT_ID='\$INFISICAL_PROJECT_ID'; export PATH='/home/ua/.local/bin:/usr/local/bin:\$PATH'; cd \$STAGING_DIR && uv run scripts/infisical_provision_factory_env.py --machine-name 'Staging VPS HQ' --machine-slug staging-hq --factory-role HEADQUARTERS --source-env dev\"
            
            echo '--> Creating bootstrap .env file...'
            sudo -u ua bash -c \"echo \\\"INFISICAL_CLIENT_ID='\$INFISICAL_CLIENT_ID'\\\" > \$STAGING_DIR/.env\"
            sudo -u ua bash -c \"echo \\\"INFISICAL_CLIENT_SECRET='\$INFISICAL_CLIENT_SECRET'\\\" >> \$STAGING_DIR/.env\"
            sudo -u ua bash -c \"echo \\\"INFISICAL_PROJECT_ID='\$INFISICAL_PROJECT_ID'\\\" >> \$STAGING_DIR/.env\"
            sudo -u ua bash -c \"echo \\\"INFISICAL_ENVIRONMENT='staging-hq'\\\" >> \$STAGING_DIR/.env\"
            sudo -u ua bash -c \"echo \\\"UA_INFISICAL_ENABLED=1\\\" >> \$STAGING_DIR/.env\"
            
            echo '--> Syncing dependencies with uv...'
            sudo -u ua bash -c \"export PATH='/home/ua/.local/bin:/usr/local/bin:\$PATH'; cd \$STAGING_DIR && uv sync\"
            
            echo '--> Restarting staging services...'
            sudo systemctl restart universal-agent-staging-gateway universal-agent-staging-api
            echo '--> Deployment complete!'
          "
