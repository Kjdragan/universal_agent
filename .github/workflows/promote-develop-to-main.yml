name: Promote Validated Develop To Main

on:
  workflow_dispatch:
    inputs:
      develop_sha:
        description: Exact validated develop commit SHA to promote to main
        required: true
        type: string
      release_note:
        description: Optional release note for the promotion
        required: false
        type: string

concurrency:
  group: promote-validated-develop-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate requested develop SHA
        env:
          TARGET_SHA: ${{ inputs.develop_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin develop main

          # Resolve short SHAs to full 40-char form
          RESOLVED_SHA="$(git rev-parse --verify "${TARGET_SHA}^{commit}" 2>/dev/null || true)"
          if [ -z "${RESOLVED_SHA}" ]; then
            echo "::error::Requested SHA does not resolve to a commit: ${TARGET_SHA}"
            exit 1
          fi
          echo "RESOLVED_SHA=${RESOLVED_SHA}" >> "$GITHUB_ENV"

          current_develop_sha="$(git rev-parse origin/develop)"
          current_main_sha="$(git rev-parse origin/main)"

          echo "Input SHA:             ${TARGET_SHA}"
          echo "Resolved SHA:          ${RESOLVED_SHA}"
          echo "Current origin/develop: ${current_develop_sha}"
          echo "Current origin/main:    ${current_main_sha}"

          if [ "${RESOLVED_SHA}" != "${current_develop_sha}" ]; then
            echo "::error::Refusing promotion because origin/develop has moved or the provided SHA is not the current validated develop head."
            exit 1
          fi

          if ! git merge-base --is-ancestor "${current_main_sha}" "${RESOLVED_SHA}"; then
            echo "::error::Refusing promotion because main cannot be fast-forwarded cleanly to the requested SHA."
            exit 1
          fi

      - name: Fast-forward main to validated develop SHA
        run: |
          set -euo pipefail
          git push origin "${RESOLVED_SHA}:refs/heads/main"

      - name: Dispatch production deploy workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code="$(curl -sS --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-prod.yml/dispatches" \
            -d '{"ref":"main"}' \
            -o "${response_file}" \
            -w '%{http_code}')"

          if [ "${http_code}" != "204" ]; then
            echo "::error::Unexpected HTTP ${http_code} while dispatching deploy-prod.yml"
            cat "${response_file}" || true
            exit 1
          fi

          rm -f "${response_file}"

          echo "Triggered Deploy Production workflow for main."

      - name: Print promotion summary
        run: |
          set -euo pipefail
          echo "Promoted develop SHA ${{ inputs.develop_sha }} to main."
          echo "Triggered Deploy Production workflow for main."
          if [ -n "${{ inputs.release_note }}" ]; then
            echo "Release note: ${{ inputs.release_note }}"
          fi
