name: Debug Production Services

on:
  workflow_dispatch:

jobs:
  debug-services:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Connect to Tailscale Network
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-debug-${{ github.run_id }}-${{ github.run_attempt }}
          ping: ${{ secrets.VPS_SSH_HOST }}
          
      - name: Fetch Logs via SSH
        env:
          SSH_HOST: ${{ secrets.VPS_SSH_HOST }}
          SSH_USER: ${{ secrets.VPS_SSH_USER }}
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o BatchMode=yes "$SSH_USER@$SSH_HOST" 'bash -s' << 'EOF'
            set -euo pipefail
            
            echo "==========================================="
            echo "universal-agent-gateway status"
            echo "==========================================="
            sudo systemctl status universal-agent-gateway --no-pager || true
            
            echo "==========================================="
            echo "universal-agent-gateway logs"
            echo "==========================================="
            sudo journalctl -u universal-agent-gateway -n 50 --no-pager || true
            
            echo "==========================================="
            echo "universal-agent-api status"
            echo "==========================================="
            sudo systemctl status universal-agent-api --no-pager || true
            
            echo "==========================================="
            echo "universal-agent-api logs"
            echo "==========================================="
            sudo journalctl -u universal-agent-api -n 150 --no-pager || true

            echo "==========================================="
            echo "API venv interpreter"
            echo "==========================================="
            ls -l /opt/universal_agent/.venv/bin/python3 || true
            readlink -f /opt/universal_agent/.venv/bin/python3 || true

          EOF
