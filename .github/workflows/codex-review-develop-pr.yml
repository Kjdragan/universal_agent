name: Codex Review – develop PRs

# This workflow integrates with the ChatGPT Codex Connector GitHub App.
# The App must be installed and "Automatic reviews" enabled at:
#   https://chatgpt.com/codex/settings/code-review
#
# When a PR targeting develop is opened or updated, this workflow posts
# an @codex review request as a PR comment, which triggers the Codex
# Connector App to run a native cloud review.
#
# Customise review behaviour by adding a "## Review guidelines" section
# to AGENTS.md at the repo root or in subdirectories.

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-codex-review:
    # Skip drafts and forks (Codex App can't reach fork secrets)
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post @codex review request
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            // Search existing comments to avoid duplicate requests on synchronize events.
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr.number, per_page: 100 }
            );
            const alreadyRequested = comments.some(
              c => c.user.type === 'Bot' && c.body.includes('@codex review')
            );

            if (!alreadyRequested || context.eventName === 'pull_request' && context.payload.action === 'opened') {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: [
                  '<!-- codex-auto-review -->',
                  '@codex review',
                  '',
                  '> *Automated review request posted by CI for PR #' + pr.number + '.*',
                  '> See [AGENTS.md](./AGENTS.md) for project-specific review guidelines.',
                ].join('\n'),
              });
              core.info('Posted @codex review request.');
            } else {
              core.info('Skipped: @codex review comment already exists for this PR.');
            }
