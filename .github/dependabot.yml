# Dependabot configuration.
#
# Dependabot opens dependency-update PRs against the default branch (main),
# where they flow through the same gate as every other change:
# PR → pr-validate (+ GitGuardian) → auto-merge → deploy.
#
# HISTORY / why no `target-branch`: this file used to set
# `target-branch: develop` to protect the old `feature/latest2 → develop → main`
# fast-forward chain that `/ship` relied on. That branch model was retired
# 2026-05-10 (develop deleted); the chain no longer exists. The dangling
# `target-branch: develop` then pointed Dependabot at a non-existent branch,
# which silently stopped it from opening PRs (last Dependabot PR: 2026-05-19).
# Removing it (2026-05-30) restores Dependabot against `main`.
#
# Note: Dependabot's `pip` ecosystem reads pyproject.toml, not uv.lock — after
# merging a bump, regenerate the lock with `uv lock` / `uv sync` so deploy.yml's
# `uv sync --frozen` on the VPS resolves cleanly.

version: 2
updates:

  # Python dependencies (uv / pyproject.toml)
  # Dependabot's pip ecosystem reads pyproject.toml directly. It does not
  # natively understand uv.lock; users merging Dependabot's PRs must run
  # `uv sync` (or `uv lock --upgrade-package <name>`) to refresh the lock
  # before deployment. The dependencies install via uv on the production
  # VPS in deploy.yml, so the lockfile must be regenerated locally.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group security updates separately so they can be expedited if needed
    groups:
      python-security-updates:
        applies-to: security-updates
        patterns:
          - "*"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "12:00"
      timezone: "America/Chicago"
    labels:
      - "dependencies"
      - "ci-cd"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
