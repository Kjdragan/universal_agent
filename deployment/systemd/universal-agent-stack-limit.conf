[Service]
# Raise the stack size limit to 32 MB so that the execve() arg+env ceiling
# (stack_limit / 4 on Linux) becomes ~8 MB instead of the default ~2 MB.
# This prevents E2BIG errors when spawning Claude Code subprocesses with
# large environment blocks (system events, Infisical secrets, etc.).
LimitSTACK=33554432
